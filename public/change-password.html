<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="max-w-md mx-auto mt-10 p-6 border rounded-lg shadow">
    <h2 class="text-xl font-bold mb-4">Change Password</h2>
    <div id="error" class="text-red-500 mb-2 hidden"></div>

    <input type="password" id="currentPassword" placeholder="Current Password" class="w-full border p-2 mb-2"><br>
    <input type="password" id="newPassword" placeholder="New Password" class="w-full border p-2 mb-2"><br>

    <button onclick="changePassword()" class="bg-blue-500 text-white px-4 py-2 rounded">Submit</button>
  </div>

  <script>
    async function changePassword() {
      const current = document.getElementById('currentPassword').value;
      const newPass = document.getElementById('newPassword').value;
      const err = document.getElementById('error');

      const res = await fetch('/api/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: current, newPassword: newPass })
      });

      const data = await res.json();
      if (!data.success) {
        err.innerText = data.message;
        err.classList.remove('hidden');
        return;
      }

      alert('Password changed! Please login again.');
      window.location.href = '/login';
    }
  </script>
</body>
</html>
