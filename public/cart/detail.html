<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - ShopEasy</title>
  <!-- Import styles (keep Tailwind/custom styles from your project) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="max-w-7xl mx-auto px-4 py-8">
  <!-- Navigation bar (keep your project's navigation, at least add links to home/category page) -->
  <nav class="mb-8 flex justify-between items-center">
    <a href="/index.html" class="text-xl font-bold text-blue-600">ShopEasy</a>
    <div class="flex gap-4">
      <a href="/category/detail.html?catid=1" class="text-gray-700 hover:text-blue-600">Categories</a>
      <a href="/cart/detail.html" class="text-gray-700 hover:text-blue-600">
        <i class="fa-solid fa-cart-shopping mr-1"></i>
        Cart (<span id="cart-count">0</span>)
      </a>
    </div>
  </nav>

  <!-- ========== Core: Cart DOM Container (Must be added here) ========== -->
  <div class="cart-container max-w-4xl mx-auto">
    <!-- Cart title (dynamic update by JS) -->
    <h2 id="cart-title" class="text-2xl font-bold mb-6">My Shopping Cart (0 items)</h2>
    
    <!-- Cart item list (core container, id=cart-items) - Items rendered by JS -->
    <div id="cart-items" class="cart-items space-y-4 border-b pb-6 mb-6">
      <!-- Default empty cart prompt (replaced by JS when items exist) -->
      <div class="text-center text-gray-500 py-8">Your cart is empty</div>
    </div>
    
    <!-- Cart total price (dynamic update by JS) -->
    <div class="text-right text-xl font-bold mb-6">
      Total: <span id="cart-total" class="text-blue-600">$0.00</span>
    </div>
    
    <!-- Clear cart button (bind click event by JS) -->
    <button id="clear-cart" class="px-6 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition-colors">
      <i class="fa-solid fa-trash mr-2"></i> Clear Cart
    </button>
  </div>

  <!-- ========== Import JS (order cannot be changed) ========== -->
  <!-- 1. Third-party libraries -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- 2. Global config/utils -->
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/common.js"></script>
  <!-- 3. Cart core logic (core.js first, then index.js) -->
  <script src="/js/cart/core.js"></script>
  <script src="/js/cart/index.js"></script>
</body>
</html>
