<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Panel</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api/index.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/user.css"> 
</head>

<body class="bg-gray-50 font-sans">

<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-2">
    <div class="flex items-center gap-6 w-full md:w-auto">
      <a href="index.html" class="text-2xl font-bold text-blue-600">ShopEasy</a>
    </div>
  </div>
</header>

<div class="container mx-auto px-4 py-8">
  <!-- 主要布局容器：左侧侧边栏 + 右侧内容区 -->
  <div class="flex flex-col md:flex-row gap-8 items-start">
    
    <!-- 左侧：侧边栏 -->
    <div class="user-sidebar w-full md:w-64" id="userSidebar">
      <button class="btn active" data-target="profile-content">
        <i class="fa-solid fa-user"></i> Public Profile
      </button>
      <button class="btn" data-target="account-content">
        <i class="fa-solid fa-gear"></i> Account Settings
      </button>
      <button class="btn" data-target="orders-content">
        <i class="fa-solid fa-box-archive"></i> My Orders
      </button>
      <button class="btn" data-target="appearance-content">
        <i class="fa-solid fa-paintbrush"></i> Appearance
      </button>
      <div class="border-t border-gray-100 my-2"></div>
      <button class="btn text-red-600 hover:bg-red-50" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>

    <!-- 右侧：内容展示区 -->
    <div class="flex-1 w-full bg-white p-6 md:p-8 rounded-lg shadow-sm min-h-[500px]">
      
      <!-- 1. 个人资料内容 -->
      <div id="profile-content" class="content-area active">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Public Profile</h2>
        <div class="flex flex-col sm:flex-row gap-6 items-start">
          <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-3xl font-bold shrink-0">
            JD
          </div>
          <div class="space-y-4 w-full">
            <div>
              <label class="block text-sm font-medium text-gray-500">Display Name</label>
              <p class="text-lg font-medium">User</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-500">Bio</label>
              <p class="text-gray-600">Love shopping here! 🛍️</p>
            </div>
            <button class="text-blue-600 hover:underline text-sm font-medium">Edit Profile</button>
          </div>
        </div>
      </div>

      <!-- 2. 账户设置内容 -->
      <div id="account-content" class="content-area">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Account Settings</h2>
        <form class="space-y-6 max-w-lg">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" value="user@shop.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" value="••••••••" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            <p class="text-sm text-gray-500 mt-1">Last changed 3 months ago</p>
          </div>
          <button type="button" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Update Settings</button>
        </form>
      </div>

      <!-- 3. 我的订单内容 (这是你要的 Orders 页面) -->
    <div id="orders-content" class="content-area">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">My Recent Orders</h2>
      <div id="realOrdersList" class="space-y-4"></div>
    </div>


      <!-- 4. 外观设置内容 -->
      <div id="appearance-content" class="content-area">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Appearance</h2>
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">Theme Mode</label>
            <div class="grid grid-cols-3 gap-4">
              <button class="border-2 border-blue-500 bg-blue-50 rounded-lg p-4 text-center">
                <i class="fa-solid fa-sun text-xl text-gray-800 mb-2 block"></i>
                <span class="text-sm font-medium">Light</span>
              </button>
              <button class="border-2 border-gray-200 hover:border-gray-300 rounded-lg p-4 text-center">
                <i class="fa-solid fa-moon text-xl text-gray-800 mb-2 block"></i>
                <span class="text-sm font-medium">Dark</span>
              </button>
              <button class="border-2 border-gray-200 hover:border-gray-300 rounded-lg p-4 text-center">
                <i class="fa-solid fa-desktop text-xl text-gray-800 mb-2 block"></i>
                <span class="text-sm font-medium">System</span>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<footer class="bg-gray-800 text-white py-8 mt-12">
  <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
    <div>
      <p class="text-lg font-bold">ShopEasy - Virtual Shopping Website</p>
      <p class="text-gray-400">© 2026 IEMS5718 Phase 4</p>
    </div>
    <div class="flex gap-6">
      <i class="fa-brands fa-facebook text-gray-400"></i>
      <i class="fa-brands fa-twitter text-gray-400"></i>
      <i class="fa-brands fa-instagram text-gray-400"></i>
    </div>
  </div>
</footer>

<script src="js/user.js"></script>
<script src="js/login.js"></script>

</body>
</html>
