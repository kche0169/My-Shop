<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy - 虚拟购物网站</title>

    <!-- Tailwind CSS -->
    <!-- <link href="https://cdn.tailwindcss.com" rel="stylesheet"> -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-gray-50 font-sans">

<!-- ================= Header ================= -->
<header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">

        <!-- Navigation -->
        <nav class="w-full md:w-auto">
            <div class="flex items-center">
                <a href="index.html" class="text-2xl font-bold text-blue-600 mr-6">ShopEasy</a>
                <div class="flex items-center text-gray-600">
                    <span class="text-gray-800 font-medium">Home</span>
                </div>
            </div>
        </nav>

        <!-- Shopping List -->
        <div class="relative inline-block w-full md:w-auto">
            <input type="checkbox" id="cart-toggle" class="hidden">

            <label for="cart-toggle"
                   class="flex items-center bg-blue-600 text-white py-2 px-4 rounded-md
                          hover:bg-blue-700 transition-colors duration-300 cursor-pointer
                          w-full justify-center md:justify-start">
                <i class="fa-solid fa-cart-shopping mr-2"></i>
                <span>Shopping List</span>
                <span class="ml-2 bg-white text-blue-600 rounded-full w-6 h-6
                             flex items-center justify-center text-sm">2</span>
            </label>

            <!-- Dropdown -->
            <div class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg
                        z-50 hidden border border-gray-200">

                <div class="px-4 py-3 border-b border-gray-200 font-medium text-gray-800">
                    我的购物清单（2件商品）
                </div>

                <div class="px-4 py-3 max-h-60 overflow-y-auto">
                    <div class="flex items-center justify-between mb-4 pb-4 border-b border-gray-100">
                        <span class="text-gray-800 w-28 truncate">无线蓝牙耳机</span>
                        <input type="number" value="1" min="1"
                               class="w-16 px-2 py-1 border border-gray-300 rounded-md text-center">
                        <span class="text-gray-800 font-medium">$199.99</span>
                    </div>

                    <div class="flex items-center justify-between">
                        <span class="text-gray-800 w-28 truncate">智能手表</span>
                        <input type="number" value="1" min="1"
                               class="w-16 px-2 py-1 border border-gray-300 rounded-md text-center">
                        <span class="text-gray-800 font-medium">$299.99</span>
                    </div>
                </div>

                <div class="px-4 py-3 border-t border-gray-200 bg-gray-50">
                    <div class="flex justify-between font-bold text-lg mb-3">
                        <span>总计：</span>
                        <span class="text-blue-600">$499.98</span>
                    </div>
                    <button class="w-full bg-blue-600 text-white py-2 px-4 rounded-md
                                   hover:bg-blue-700 transition-colors duration-300
                                   flex items-center justify-center">
                        <i class="fa-solid fa-arrow-right mr-2"></i>
                        Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- ================= Main ================= -->
<main class="container mx-auto px-4 py-8">

    <!-- Category -->
    <section class="mb-8">
        <div class="bg-white rounded-lg shadow-sm p-4">
            <h2 class="text-xl font-bold mb-4 text-gray-800">商品分类</h2>
            <ul class="flex flex-wrap gap-4">
                <li><a href="category1.html" class="px-4 py-2 bg-blue-100 text-blue-600 rounded-md">电子产品</a></li>
                <li><a href="category2.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-md">家居用品</a></li>
                <li><a href="category3.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-md">运动户外</a></li>
                <li><a href="category4.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-md">时尚服饰</a></li>
            </ul>
        </div>
    </section>

    <!-- Product List -->
    <section>
        <h2 class="text-2xl font-bold mb-6 text-gray-800">热门产品</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

            <!-- Product Card -->
            <a href="products/product1.html" class="block group">
                <div class="bg-white rounded-lg shadow-sm p-4 h-full flex flex-col">
                    <img src="images/thumbnails/prod1.jpg" alt="无线蓝牙耳机"
                         class="w-full h-48 object-cover rounded-md mb-4">
                    <h3 class="text-lg font-medium text-gray-800 mb-2">无线蓝牙耳机</h3>
                    <p class="text-gray-600 text-sm mb-4 flex-grow">蓝牙5.3 | 降噪 | 24小时续航</p>
                    <p class="text-blue-600 font-bold text-xl mb-4">$199.99</p>
                    <button class="bg-blue-600 text-white py-2 rounded-md flex items-center justify-center">
                        <i class="fa-solid fa-cart-shopping mr-2"></i>Add to Cart
                    </button>
                </div>
            </a>

            <!-- Product Card -->
            <a href="products/product2.html" class="block group">
                <div class="bg-white rounded-lg shadow-sm p-4 h-full flex flex-col">
                    <img src="images/thumbnails/prod2.jpg" alt="智能手表"
                         class="w-full h-48 object-cover rounded-md mb-4">
                    <h3 class="text-lg font-medium text-gray-800 mb-2">智能手表</h3>
                    <p class="text-gray-600 text-sm mb-4 flex-grow">心率 | 血氧 | 防水50米</p>
                    <p class="text-blue-600 font-bold text-xl mb-4">$299.99</p>
                    <button class="bg-blue-600 text-white py-2 rounded-md flex items-center justify-center">
                        <i class="fa-solid fa-cart-shopping mr-2"></i>Add to Cart
                    </button>
                </div>
            </a>

        </div>
    </section>
</main>

<!-- ================= Footer ================= -->
<footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <p class="text-lg font-bold">ShopEasy 虚拟购物网站</p>
            <p class="text-gray-400">© 2026 IEMS5718 Phase 1</p>
        </div>
        <div class="flex gap-6">
            <i class="fa-brands fa-facebook text-gray-400"></i>
            <i class="fa-brands fa-twitter text-gray-400"></i>
            <i class="fa-brands fa-instagram text-gray-400"></i>
        </div>
    </div>
</footer>

</body>
</html>
